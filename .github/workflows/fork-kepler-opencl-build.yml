name: Fork Kepler OpenCL Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/fork-kepler-opencl-build.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "ggml/**"
      - "src/**"
      - "include/**"
      - "common/**"
      - "docs/**"
      - "CHANGELOG.md"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/fork-kepler-opencl-build.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "ggml/**"
      - "src/**"
      - "include/**"
      - "common/**"
      - "docs/**"
      - "CHANGELOG.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linux-kepler-opencl:
    name: Linux Kepler OpenCL
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3 \
            ocl-icd-opencl-dev \
            opencl-headers

      - name: Configure
        run: cmake --preset fork-kepler-linux-release

      - name: Build
        run: cmake --build --preset fork-kepler-linux-release --parallel

      - name: Smoke check
        run: ./build-fork-kepler-linux-release/bin/llama-cli --help > /dev/null

      - name: Collect artifacts
        run: |
          mkdir -p dist/linux
          cp -a build-fork-kepler-linux-release/bin/. dist/linux/
          if [ -d build-fork-kepler-linux-release/lib ]; then
            cp -a build-fork-kepler-linux-release/lib/. dist/linux/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fork-kepler-opencl-linux
          path: dist/linux
          if-no-files-found: error

  windows-kepler-opencl:
    name: Windows Kepler OpenCL
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ninja
        run: choco install ninja

      - name: Install OpenCL SDK
        shell: powershell
        run: |
          git clone https://github.com/KhronosGroup/OpenCL-Headers
          Push-Location OpenCL-Headers
          cmake -B build `
            -DBUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_CXX_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-x64-release"
          cmake --build build --target install --config Release
          Pop-Location

          git clone https://github.com/KhronosGroup/OpenCL-ICD-Loader
          Push-Location OpenCL-ICD-Loader
          cmake -B build-x64-release `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-x64-release" `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-x64-release"
          cmake --build build-x64-release --target install --config Release
          Pop-Location

          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP/opencl-x64-release/bin"

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset fork-kepler-windows-release -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-x64-release"

      - name: Build
        run: cmake --build --preset fork-kepler-windows-release --parallel

      - name: Smoke check
        run: .\build-fork-kepler-windows-release\bin\llama-cli.exe --help > $null

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item build-fork-kepler-windows-release\bin\* dist\windows -Recurse -Force
          if (Test-Path build-fork-kepler-windows-release\lib) {
            Copy-Item build-fork-kepler-windows-release\lib\* dist\windows -Recurse -Force
          }
          if (Test-Path "$env:RUNNER_TEMP/opencl-x64-release/bin") {
            Copy-Item "$env:RUNNER_TEMP/opencl-x64-release/bin\*" dist\windows -Recurse -Force
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fork-kepler-opencl-windows
          path: dist/windows
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs:
      - linux-kepler-opencl
      - windows-kepler-opencl
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: fork-kepler-opencl-linux
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: fork-kepler-opencl-windows
          path: release-assets/windows

      - name: Determine release version
        id: release_meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          import urllib.request

          changelog = open("CHANGELOG.md", "r", encoding="utf-8").read()
          matches = re.findall(r"^##\s+(.+)$", changelog, flags=re.MULTILINE)

          version = ""
          for heading in matches:
              heading = heading.strip()
              if heading.lower() != "unreleased":
                  version = heading
                  break

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as fh:
              if not version:
                  fh.write("should_release=false\n")
                  fh.write("reason=no_version_heading\n")
                  raise SystemExit(0)

              token = os.environ["GH_TOKEN"]
              repo = os.environ["REPO"]
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/releases",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "cursor-workflow",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  releases = json.load(resp)

              release_name = f"Version {version}"
              if any(r.get("name") == release_name for r in releases):
                  fh.write("should_release=false\n")
                  fh.write("reason=version_already_released\n")
                  fh.write(f"version={version}\n")
                  raise SystemExit(0)

              tag = f"build-{os.environ['RUN_NUMBER']}"
              fh.write("should_release=true\n")
              fh.write(f"version={version}\n")
              fh.write(f"tag={tag}\n")
              fh.write(f"release_name={release_name}\n")
          PY

      - name: Show release decision
        run: |
          echo "should_release=${{ steps.release_meta.outputs.should_release }}"
          echo "reason=${{ steps.release_meta.outputs.reason }}"
          echo "version=${{ steps.release_meta.outputs.version }}"
          echo "tag=${{ steps.release_meta.outputs.tag }}"

      - name: Package artifacts
        if: steps.release_meta.outputs.should_release == 'true'
        shell: bash
        run: |
          cd release-assets
          zip -r "../fork-kepler-opencl-linux-${{ steps.release_meta.outputs.tag }}.zip" linux
          zip -r "../fork-kepler-opencl-windows-${{ steps.release_meta.outputs.tag }}.zip" windows

      - name: Extract release notes
        if: steps.release_meta.outputs.should_release == 'true'
        id: release_notes
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import re

          text = open("CHANGELOG.md", "r", encoding="utf-8").read()
          version = os.environ["VERSION"]
          pattern = rf"^##\s+{re.escape(version)}\s*$([\s\S]*?)(?=^##\s+|\Z)"
          match = re.search(pattern, text, flags=re.MULTILINE)
          notes = match.group(1).strip() if match else ""

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("body<<EOF\n")
              fh.write(f"Automated release for {version}.\n\n")
              if notes:
                  fh.write(notes)
                  fh.write("\n")
              fh.write("\nArtifacts:\n")
              fh.write(f"- Linux: fork-kepler-opencl-linux-{os.environ['TAG']}.zip\n")
              fh.write(f"- Windows: fork-kepler-opencl-windows-{os.environ['TAG']}.zip\n")
              fh.write("EOF\n")
          PY
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
          TAG: ${{ steps.release_meta.outputs.tag }}

      - name: Create GitHub release
        if: steps.release_meta.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_meta.outputs.tag }}" \
            "fork-kepler-opencl-linux-${{ steps.release_meta.outputs.tag }}.zip" \
            "fork-kepler-opencl-windows-${{ steps.release_meta.outputs.tag }}.zip" \
            --target "${{ github.sha }}" \
            --title "${{ steps.release_meta.outputs.release_name }}" \
            --notes "${{ steps.release_notes.outputs.body }}"
