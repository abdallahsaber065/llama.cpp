# Kepler OpenCL only: Linux + Windows (GGML_OPENCL_KEPLER=ON). Other repo workflows are disabled (*.yml.disabled).
name: Fork Kepler OpenCL Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/fork-kepler-opencl-build.yml"
      - ".gitattributes"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "ggml/**"
      - "src/**"
      - "include/**"
      - "common/**"
      - "docs/**"
      - "CHANGELOG.md"
      - "AGENTS.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linux-kepler-opencl:
    name: Linux Kepler OpenCL
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3 \
            ocl-icd-opencl-dev \
            opencl-headers

      - name: Configure
        run: cmake --preset fork-kepler-linux-release

      - name: Build
        run: cmake --build --preset fork-kepler-linux-release --parallel

      - name: Smoke check
        run: ./build-fork-kepler-linux-release/bin/llama-cli --help > /dev/null

      - name: Collect artifacts
        run: |
          mkdir -p dist/linux
          cp -a build-fork-kepler-linux-release/bin/. dist/linux/
          if [ -d build-fork-kepler-linux-release/lib ]; then
            cp -a build-fork-kepler-linux-release/lib/. dist/linux/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fork-kepler-opencl-linux
          path: dist/linux
          if-no-files-found: error

  windows-kepler-opencl:
    name: Windows Kepler OpenCL
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ninja
        run: choco install ninja

      - name: Install OpenCL SDK
        shell: powershell
        run: |
          git clone https://github.com/KhronosGroup/OpenCL-Headers
          Push-Location OpenCL-Headers
          cmake -B build `
            -DBUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_TESTING=OFF `
            -DOPENCL_HEADERS_BUILD_CXX_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-x64-release"
          cmake --build build --target install --config Release
          Pop-Location

          git clone https://github.com/KhronosGroup/OpenCL-ICD-Loader
          Push-Location OpenCL-ICD-Loader
          cmake -B build-x64-release `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-x64-release" `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/opencl-x64-release"
          cmake --build build-x64-release --target install --config Release
          Pop-Location

          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP/opencl-x64-release/bin"

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset fork-kepler-windows-release -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/opencl-x64-release"

      - name: Build
        run: cmake --build --preset fork-kepler-windows-release --parallel

      - name: Smoke check
        run: .\build-fork-kepler-windows-release\bin\llama-cli.exe --help > $null

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item build-fork-kepler-windows-release\bin\* dist\windows -Recurse -Force
          if (Test-Path build-fork-kepler-windows-release\lib) {
            Copy-Item build-fork-kepler-windows-release\lib\* dist\windows -Recurse -Force
          }
          if (Test-Path "$env:RUNNER_TEMP/opencl-x64-release/bin") {
            Copy-Item "$env:RUNNER_TEMP/opencl-x64-release/bin\*" dist\windows -Recurse -Force
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fork-kepler-opencl-windows
          path: dist/windows
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs:
      - linux-kepler-opencl
      - windows-kepler-opencl
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: fork-kepler-opencl-linux
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: fork-kepler-opencl-windows
          path: release-assets/windows

      # Unique tag every run: workflow run number + run attempt (increments on re-run) + short SHA.
      - name: Package artifacts and create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
          TAG="kepler-opencl-r${{ github.run_number }}-a${{ github.run_attempt }}-${SHORT_SHA}"

          cd release-assets
          zip -r "../fork-kepler-opencl-linux-${TAG}.zip" linux
          zip -r "../fork-kepler-opencl-windows-${TAG}.zip" windows
          cd ..

          NOTES_FILE="$(mktemp)"
          {
            echo "Automated **Kepler OpenCL** build (Linux + Windows)."
            echo ""
            echo "- Workflow: [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Tag: \`${TAG}\` (run **${{ github.run_number }}**, attempt **${{ github.run_attempt }}**)"
            echo ""
            echo "### Artifacts"
            echo "- \`fork-kepler-opencl-linux-${TAG}.zip\`"
            echo "- \`fork-kepler-opencl-windows-${TAG}.zip\`"
            echo ""
            if [ -f CHANGELOG.md ]; then
              echo "### Changelog excerpt (top section)"
              echo ""
              awk 'BEGIN{p=0} /^## /{if(p)exit; p=1; next} p' CHANGELOG.md | head -n 80 || true
            fi
          } > "$NOTES_FILE"

          gh release create "$TAG" \
            "fork-kepler-opencl-linux-${TAG}.zip" \
            "fork-kepler-opencl-windows-${TAG}.zip" \
            --target "${{ github.sha }}" \
            --title "Kepler OpenCL ${TAG}" \
            --notes-file "$NOTES_FILE"
